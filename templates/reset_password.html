<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — HealthGuardian</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --purple: #7C3AED; --purple2: #9F67FF; --blue: #3B82F6;
            --bg: #06060F; --glass: rgba(255,255,255,0.03); --glass2: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.07); --text: #EEEEFF; --text2: #7B82A8; --text3: #3D4268;
        }
        body {
            font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
        }
        body::before {
            content: ''; position: fixed; top: -30%; left: -10%; width: 70%; height: 70%;
            background: radial-gradient(ellipse, rgba(124,58,237,0.12) 0%, transparent 65%); pointer-events: none;
        }
        body::after {
            content: ''; position: fixed; bottom: -20%; right: -10%; width: 60%; height: 60%;
            background: radial-gradient(ellipse, rgba(59,130,246,0.08) 0%, transparent 65%); pointer-events: none;
        }
        .container { position: relative; z-index: 1; width: 100%; max-width: 420px; }
        .logo {
            text-align: center; font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
            margin-bottom: 32px; text-decoration: none; display: flex; align-items: center;
            justify-content: center; gap: 8px; color: var(--text);
        }
        .logo-icon {
            width: 26px; height: 26px; border-radius: 7px;
            background: linear-gradient(135deg, var(--purple), var(--blue));
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; box-shadow: 0 0 16px rgba(124,58,237,0.4);
        }
        .logo span {
            background: linear-gradient(135deg, var(--purple2), var(--blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 20px;
            padding: 36px; backdrop-filter: blur(30px);
        }
        .card-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .card-sub { font-size: 14px; color: var(--text2); margin-bottom: 28px; }
        .flash-msg { padding: 11px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; font-weight: 500; }
        .flash-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.15); color: #FCA5A5; }
        .flash-success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.15); color: #6EE7B7; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input {
            width: 100%; padding: 12px 14px; background: var(--glass2); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif;
            transition: all 0.2s; outline: none;
        }
        .form-input:focus { border-color: rgba(124,58,237,0.4); background: rgba(124,58,237,0.05); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
        .form-input::placeholder { color: var(--text3); }
        .btn-submit {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, var(--purple), var(--blue));
            color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 500;
            font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.25s;
            margin-top: 4px; box-shadow: 0 4px 20px rgba(124,58,237,0.3);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.4); }
        .back-home { text-align: center; margin-top: 20px; }
        .back-home a { font-size: 13px; color: var(--text3); text-decoration: none; transition: color 0.2s; }
        .back-home a:hover { color: var(--text2); }
        .fade-in { animation: fadeUp 0.5s ease forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 480px) { body { padding: 16px; } .card { padding: 24px 20px; } }
    
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 30px #0D0D1F inset !important;
            -webkit-text-fill-color: #EEEEFF !important;
            caret-color: #EEEEFF;
            border-color: rgba(124,58,237,0.4) !important;
        }
    </style>
</head>
<body>
<div class="container fade-in">
    <a href="/" class="logo">
        <div class="logo-icon">⚡</div>
        Health<span>Guardian</span>
    </a>
    <div class="card">
        <div class="card-title">Reset Password</div>
        <div class="card-sub">Enter your new password below</div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-msg flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="password" class="form-input" placeholder="Enter new password" required autofocus minlength="6">
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-input" placeholder="Confirm new password" required minlength="6">
            </div>
            <button type="submit" class="btn-submit">Reset Password →</button>
        </form>
    </div>
    <div class="back-home"><a href="/login">← Back to login</a></div>
</div>
<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        const p1 = document.querySelector('[name="password"]').value;
        const p2 = document.querySelector('[name="confirm_password"]').value;
        if (p1 !== p2) {
            e1.preventDefault();
            alert('Passwords do not match!');
        }
    });
</script>
</body>
</html>
